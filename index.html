<title>Camusat Forum 2026 Edition</title>
<link href="./Camusat Forum 2026 Edition_files/css2" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #36A9AC;
    min-height: 100vh;
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 560px;
    text-align: center;
    padding: 0 20px 36px;
  }

  .logo { height: 48px; width: auto; margin-bottom: 18px; }

  .divider {
    width: 36px; height: 2px;
    background: #ED7D31;
    margin: 0 auto 18px;
    border-radius: 2px;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    font-style: italic;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 18px;
  }

  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 20px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .dot {
    width: 6px; height: 6px;
    background: #ED7D31;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Card ── */
  .card {
    background: #FFFFFF;
    width: 100%;
    max-width: 560px;
    border-radius: 3px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    overflow: hidden;
  }

  .card-accent {
    height: 3px;
    background: linear-gradient(90deg, #ED7D31, #FFC000);
  }

  /* ── Form ── */
  .form-body { padding: 36px 40px 40px; }

  .section-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
  }

  .section-head-bar {
    width: 3px; height: 18px;
    background: #ED7D31;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .section-head-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #1B3969;
  }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    color: #44546A;
    margin-bottom: 6px;
  }

  .req { color: #ED7D31; margin-left: 2px; }

  .input-wrap { position: relative; }

  .input-wrap .icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: #AFBACD;
    pointer-events: none;
    display: flex;
  }

  input[type="text"],
  input[type="email"] {
    width: 100%;
    padding: 11px 14px 11px 38px;
    background: #F4F6F9;
    border: 1.5px solid #D0D8E8;
    border-radius: 2px;
    font-family: 'Calibri', Arial, sans-serif;
    font-size: 14px;
    color: #1A1A2E;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: #1B3969;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(27,57,105,0.1);
  }

  input::placeholder { color: #B0BAC8; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  hr.divider-line {
    border: none;
    border-top: 1px solid #E7E6E6;
    margin: 24px 0;
  }

  /* Radio */
  .radio-group { display: flex; flex-direction: column; gap: 8px; }

  .radio-opt {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1.5px solid #D0D8E8;
    border-radius: 2px;
    cursor: pointer;
    background: #F4F6F9;
    transition: all 0.15s;
  }

  .radio-opt:hover { border-color: #1B3969; background: #EEF2F8; }

  .radio-opt input[type="radio"] {
    accent-color: #1B3969;
    width: 16px; height: 16px;
    flex-shrink: 0;
    padding: 0;
    cursor: pointer;
  }

  .radio-label { font-size: 13.5px; color: #2C2C2C; }

  /* Button */
  .submit-btn {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: #1B3969;
    color: #fff;
    border: none;
    border-radius: 2px;
    font-family: 'Calibri', Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
  }

  .submit-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ED7D31, #FFC000);
  }

  .submit-btn:hover { background: #162E58; }

  /* Footer */
  .card-footer {
    background: #36A9AC;
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .card-footer p {
    font-size: 10.5px;
    color: rgba(255,255,255,0.7);
  }

  .footer-logo { height: 18px; width: auto; }

  @media (max-width: 500px) {
    .form-body { padding: 28px 24px 32px; }
    .card-footer { padding: 12px 24px; flex-direction: column; text-align: center; }
    .field-row { grid-template-columns: 1fr; }
    .header h1 { font-size: 26px; }
  }
</style>
</head>
